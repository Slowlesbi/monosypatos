
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Mural</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap');

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 30% 30%, #6b46c1, transparent 40%),
              radial-gradient(circle at 70% 70%, #3182ce, transparent 40%),
              linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

h1 {
  text-align: center;
  padding: 20px;
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 36px;
  letter-spacing: 2px;
}

#zonaNotas {
  flex: 1;
  padding: 30px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  overflow-y: auto;
}

.nota {
  width: 200px;
  min-height: 160px;
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  word-wrap: break-word;
  position: relative;
  transform: rotate(-2deg);
  transition: 0.2s;
}

.nota:hover {
  transform: scale(1.05);
}

.azul {
  background: rgba(99,179,237,0.15);
  border-left: 4px solid #63b3ed;
}

.morado {
  background: rgba(183,148,244,0.15);
  border-left: 4px solid #b794f4;
  transform: rotate(2deg);
}

small {
  opacity: 0.6;
  font-size: 11px;
  display: block;
  margin-top: 10px;
}

#inputArea {
  display: flex;
  gap: 8px;
  padding: 15px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

#mensajeInput {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  background: #6b46c1;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  opacity: 0.85;
}
  
@keyframes pop {
  0% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.3); }
  100% { transform: scale(0); opacity:0; }
}

.rosa {
  background: rgba(255,105,180,0.15);
  border-left: 4px solid hotpink;
}

.verde {
  background: rgba(144,238,144,0.15);
  border-left: 4px solid limegreen;
}

.amarillo {
  background: rgba(255,255,0,0.15);
  border-left: 4px solid gold;
}
</style>
</head>

<body>

<h1>Nuestro Mural</h1>

<div class="input-container">
  <input type="text" id="noteInput" placeholder="Escribe una nota...">
  <button onclick="addNote()">Agregar</button>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

function addNote(text = null, x = null, y = null, color = "#fff9a6") {
  const input = document.getElementById("noteInput");
  const content = text || input.value.trim();
  if (!content) return;

  const note = document.createElement("div");
  note.className = "note";
  note.style.background = color;
  note.innerHTML = content;

  const posX = x ?? Math.random() * (window.innerWidth - 220);
  const posY = y ?? Math.random() * (window.innerHeight - 220);

  note.style.left = posX + "px";
  note.style.top = posY + "px";

  makeDraggable(note);

  /* Botón menú */
  const menuBtn = document.createElement("div");
  menuBtn.className = "menu-btn";
  menuBtn.innerText = "⋮";

  const menu = document.createElement("div");
  menu.className = "menu";

  /* Editar */
  const editBtn = document.createElement("button");
  editBtn.innerText = "Editar";
  editBtn.onclick = () => {
    const nuevo = prompt("Editar nota:", note.innerText);
    if (nuevo) {
      note.childNodes[0].nodeValue = nuevo;
      updateStorage();
    }
  };

  /* Eliminar */
  const deleteBtn = document.createElement("button");
  deleteBtn.innerText = "Eliminar";
  deleteBtn.onclick = () => {
    note.style.animation = "pop 0.2s reverse";
    setTimeout(() => {
      note.remove();
      updateStorage();
    }, 200);
  };

  /* Colores */
  const colors = ["#fff9a6", "#ffb3c1", "#b5ead7", "#c7ceea", "#ffd6a5"];
  const colorPicker = document.createElement("div");
  colorPicker.className = "color-picker";

  colors.forEach(c => {
    const circle = document.createElement("div");
    circle.className = "color";
    circle.style.background = c;
    circle.onclick = () => {
      note.style.background = c;
      updateStorage();
    };
    colorPicker.appendChild(circle);
  });

  menu.appendChild(editBtn);
  menu.appendChild(deleteBtn);
  menu.appendChild(colorPicker);

  menuBtn.onclick = (e) => {
    e.stopPropagation();
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  };

  note.appendChild(menuBtn);
  note.appendChild(menu);
  document.body.appendChild(note);

  if (!text) {
    notes.push({ content, x: posX, y: posY, color });
    saveNotes();
    input.value = "";
  }
}

function makeDraggable(element) {
  let offsetX, offsetY, isDragging = false;

  element.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    element.style.left = e.clientX - offsetX + "px";
    element.style.top = e.clientY - offsetY + "px";
  });

  document.addEventListener("mouseup", () => {
    if (isDragging) {
      isDragging = false;
      updateStorage();
    }
  });
}

function updateStorage() {
  const allNotes = document.querySelectorAll(".note");
  notes = [];
  allNotes.forEach(note => {
    notes.push({
      content: note.childNodes[0].nodeValue,
      x: parseInt(note.style.left),
      y: parseInt(note.style.top),
      color: note.style.background
    });
  });
  saveNotes();
}

/* Cargar notas guardadas */
window.onload = () => {
  notes.forEach(n => addNote(n.content, n.x, n.y, n.color));
};
</script>

</body>
</html>
