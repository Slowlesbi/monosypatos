
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Mural</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap');

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 30% 30%, #6b46c1, transparent 40%),
              radial-gradient(circle at 70% 70%, #3182ce, transparent 40%),
              linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

h1 {
  text-align: center;
  padding: 20px;
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 36px;
  letter-spacing: 2px;
}

#zonaNotas {
  position: relative;
  width: 100%;
  height: calc(100vh - 140px);
}

.nota {
  width: 200px;
  min-height: 160px;
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  word-wrap: break-word;
  position: absolute;
  cursor: grab;
  transition: transform 0.2s;
}

.nota:active {
  cursor: grabbing;
}

.azul {
  background: rgba(99,179,237,0.15);
  border-left: 4px solid #63b3ed;
}

.morado {
  background: rgba(183,148,244,0.15);
  border-left: 4px solid #b794f4;
}

.rosa {
  background: rgba(255,105,180,0.15);
  border-left: 4px solid hotpink;
}

.verde {
  background: rgba(144,238,144,0.15);
  border-left: 4px solid limegreen;
}

.amarillo {
  background: rgba(255,255,0,0.15);
  border-left: 4px solid gold;
}

.menu-btn {
  position: absolute;
  top: 6px;
  right: 10px;
  cursor: pointer;
  font-weight: bold;
}

.menu {
  display: none;
  position: absolute;
  top: 25px;
  right: 10px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  font-size: 13px;
}

.menu div {
  cursor: pointer;
  margin-bottom: 6px;
}

.menu div:hover {
  opacity: 0.7;
}

#inputArea {
  position: absolute;
  bottom: 0;
  width: 100%;
  display: flex;
  gap: 8px;
  padding: 15px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

#mensajeInput {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  background: #6b46c1;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

@keyframes pop {
  0% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.3); }
  100% { transform: scale(0); opacity:0; }
}
</style>
</head>

<body>

<h1>Nuestro Mural</h1>
<div id="zonaNotas"></div>

<div id="inputArea">
  <input type="text" id="mensajeInput" placeholder="Escribe una nota...">
  <button onclick="agregarNota()">Pegar</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", cargarNotas);

const colores = ["azul","morado","rosa","verde","amarillo"];

function agregarNota() {
  const input = document.getElementById("mensajeInput");
  const texto = input.value.trim();
  if (!texto) return;

  const notas = obtenerNotas();
  notas.push({
    texto: texto,
    color: colores[Math.floor(Math.random()*2)],
    x: 100,
    y: 100
  });

  guardarNotas(notas);
  renderizarNotas();
  input.value = "";
}

function renderizarNotas() {
  const zona = document.getElementById("zonaNotas");
  zona.innerHTML = "";
  const notas = obtenerNotas();

  notas.forEach((notaData, index) => {
    const nota = document.createElement("div");
    nota.className = "nota " + notaData.color;
    nota.style.left = notaData.x + "px";
    nota.style.top = notaData.y + "px";

    nota.innerHTML = `
      <div class="menu-btn" onclick="toggleMenu(event, ${index})">⋯</div>
      <div>${notaData.texto}</div>
      <div class="menu" id="menu-${index}">
        <div onclick="editarNota(${index})">✏ Editar</div>
        <div onclick="eliminarNota(${index})">🗑 Eliminar</div>
        <div>🎨 Color:</div>
        ${colores.map(c => `<div onclick="cambiarColor(${index},'${c}')">• ${c}</div>`).join("")}
      </div>
    `;

    hacerArrastrable(nota, index);
    zona.appendChild(nota);
  });
}

function toggleMenu(e, index) {
  e.stopPropagation();
  const menu = document.getElementById("menu-" + index);
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function editarNota(index) {
  const notas = obtenerNotas();
  const nuevoTexto = prompt("Editar nota:", notas[index].texto);
  if (nuevoTexto === null) return;
  notas[index].texto = nuevoTexto;
  guardarNotas(notas);
  renderizarNotas();
}

function eliminarNota(index) {
  const zona = document.getElementById("zonaNotas");
  const notaElemento = zona.children[index];

  notaElemento.style.animation = "pop 0.3s forwards";

  setTimeout(() => {
    const notas = obtenerNotas();
    notas.splice(index,1);
    guardarNotas(notas);
    renderizarNotas();
  }, 250);
}

function cambiarColor(index,color) {
  const notas = obtenerNotas();
  notas[index].color = color;
  guardarNotas(notas);
  renderizarNotas();
}

function hacerArrastrable(el,index) {
  let offsetX, offsetY, isDragging = false;

  el.addEventListener("mousedown", (e)=>{
    if(e.target.classList.contains("menu-btn")) return;
    isDragging = true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
  });

  document.addEventListener("mousemove",(e)=>{
    if(!isDragging) return;
    el.style.left = (e.clientX - offsetX) + "px";
    el.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup",()=>{
    if(!isDragging) return;
    isDragging = false;

    const notas = obtenerNotas();
    notas[index].x = el.offsetLeft;
    notas[index].y = el.offsetTop;
    guardarNotas(notas);
  });
}

function obtenerNotas(){
  return JSON.parse(localStorage.getItem("muralNotas")) || [];
}

function guardarNotas(notas){
  localStorage.setItem("muralNotas", JSON.stringify(notas));
}

function cargarNotas(){
  renderizarNotas();
}
</script>

</body>
</html>
