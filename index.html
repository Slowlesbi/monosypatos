<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Mural</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap');

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 30% 30%, #6b46c1, transparent 40%),
              radial-gradient(circle at 70% 70%, #3182ce, transparent 40%),
              linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

h1 {
  text-align: center;
  padding: 20px;
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 36px;
  letter-spacing: 2px;
}

#zonaNotas {
  flex: 1;
  padding: 30px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  overflow-y: auto;
}

.nota {
  width: 200px;
  min-height: 160px;
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  word-wrap: break-word;
  position: relative;
  transform: rotate(-2deg);
  transition: 0.2s;
}

.nota:hover {
  transform: scale(1.05);
}

.azul {
  background: rgba(99,179,237,0.15);
  border-left: 4px solid #63b3ed;
}

.morado {
  background: rgba(183,148,244,0.15);
  border-left: 4px solid #b794f4;
  transform: rotate(2deg);
}

small {
  opacity: 0.6;
  font-size: 11px;
  display: block;
  margin-top: 10px;
}

#inputArea {
  display: flex;
  gap: 8px;
  padding: 15px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

#mensajeInput {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  background: #6b46c1;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  opacity: 0.85;
}
</style>
</head>

<body>

<h1>Nuestro Mural</h1>

<div id="zonaNotas"></div>

<div id="inputArea">
  <input type="text" id="mensajeInput" placeholder="Escribe una nota...">
  <button onclick="agregarNota()">Pegar</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", cargarNotas);

function agregarNota() {
  const input = document.getElementById("mensajeInput");
  const texto = input.value.trim();
  if (texto === "") return;

  crearNota(texto);
  guardarNota(texto);

  input.value = "";
}

function crearNota(texto) {
  const zona = document.getElementById("zonaNotas");

  const nota = document.createElement("div");
  nota.classList.add("nota");

  // alternar color
  const tipo = Math.random() > 0.5 ? "azul" : "morado";
  nota.classList.add(tipo);

  const contenido = document.createElement("div");
  contenido.textContent = texto;

  const fecha = document.createElement("small");
  fecha.textContent = new Date().toLocaleString();

  nota.appendChild(contenido);
  nota.appendChild(fecha);

  zona.appendChild(nota);
}

function guardarNota(texto) {
  let notas = JSON.parse(localStorage.getItem("muralNotas")) || [];
  notas.push(texto);
  localStorage.setItem("muralNotas", JSON.stringify(notas));
}

function cargarNotas() {
  let notas = JSON.parse(localStorage.getItem("muralNotas")) || [];
  notas.forEach(texto => crearNota(texto));
}
</script>

</body>
</html>
